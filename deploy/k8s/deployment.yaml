# FinOversea Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: finoversea-backend
  namespace: finoversea
  labels:
    app: finoversea
    component: backend
    version: v1.0.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: finoversea
      component: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: finoversea
        component: backend
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: finoversea-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: backend
          image: finoversea/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: finoversea-config
                  key: APP_NAME
            - name: APP_VERSION
              valueFrom:
                configMapKeyRef:
                  name: finoversea-config
                  key: APP_VERSION
            - name: DEBUG
              valueFrom:
                configMapKeyRef:
                  name: finoversea-config
                  key: DEBUG
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: finoversea-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: finoversea-config
                  key: REDIS_URL
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: finoversea-secrets
                  key: OPENAI_API_KEY
            - name: OPENAI_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: finoversea-config
                  key: OPENAI_BASE_URL
            - name: LLM_MODEL
              valueFrom:
                configMapKeyRef:
                  name: finoversea-config
                  key: LLM_MODEL
            - name: COLLECTOR_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: finoversea-config
                  key: COLLECTOR_TIMEOUT
            - name: COLLECTOR_MAX_CONCURRENT
              valueFrom:
                configMapKeyRef:
                  name: finoversea-config
                  key: COLLECTOR_MAX_CONCURRENT
            - name: PUSH_BATCH_SIZE
              valueFrom:
                configMapKeyRef:
                  name: finoversea-config
                  key: PUSH_BATCH_SIZE
            - name: TAG_CONFIDENCE_THRESHOLD
              valueFrom:
                configMapKeyRef:
                  name: finoversea-config
                  key: TAG_CONFIDENCE_THRESHOLD
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: finoversea
                    component: backend
                topologyKey: kubernetes.io/hostname
      tolerations:
        - key: "node-role.kubernetes.io/frontend"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"